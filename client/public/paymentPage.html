<!DOCTYPE html>
<html>
<head>
    <title>Stripe Payment Element</title>
    <script src="https://js.stripe.com/v3/"></script>

    <style>
        body {
            font-family: Arial;
            max-width: 600px;
            margin: auto;
            margin-top: 50px;
        }

        #payment-form {
            margin-top: 20px;
        }

        #submit {
            margin-top: 20px;
            background: #635bff;
            color: white;
            padding: 12px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            width: 100%;
        }
    </style>
</head>
<body>

    <h2 id="title">Pay</h2>

    <form id="payment-form">
        <div id="payment-element"><!-- Stripe Element will load here --></div>
        <button id="submit">Pay</button>
        <div id="messages" role="alert"></div>
    </form>

    <script>
        const stripe = Stripe("pk_test_51SafMe4uUluNRMATfTKUEl5MUCJbXurr08rEKZpW15EsvxgvDWTvWH9bK5QRKnejGUjff8DIoy71Gwf6LuIpxWrq00c372hQah"); // pk_test_xxx

        async function initialize() {
            const params = new URLSearchParams(window.location.search);
            const amountParam = params.get('amount');
            const displayAmount = params.get('displayAmount');
            const amount = amountParam ? Number(amountParam) : 12000; // minor units
            document.getElementById('title').textContent = `Pay ${displayAmount ? displayAmount : (amount/100).toFixed(2)} BDT`;

            const response = await fetch("/api/payments/create-payment-intent", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ amount, currency: 'bdt' })
            });

            const { clientSecret } = await response.json();

            const appearance = {
                theme: 'stripe',
            };

            const elements = stripe.elements({ appearance, clientSecret });
            const paymentElement = elements.create("payment");
            paymentElement.mount("#payment-element");

            document.querySelector("#payment-form").onsubmit = async (e) => {
                e.preventDefault();

                const { error } = await stripe.confirmPayment({
                    elements,
                    confirmParams: {
                        return_url: window.location.origin + '/book-spot',
                    },
                });

                if (error.type === "card_error" || error.type === "validation_error") {
                    showMessage(error.message);
                } else {
                    showMessage("An unexpected error occurred.");
                }
            };
        }

        // Fetches the payment intent status after payment submission
        async function checkStatus() {
            const clientSecret = new URLSearchParams(window.location.search).get(
                "payment_intent_client_secret"
            );

            if (!clientSecret) {
                return;
            }

            const { paymentIntent } = await stripe.retrievePaymentIntent(clientSecret);

            switch (paymentIntent.status) {
                case "succeeded":
                    showMessage("Payment succeeded! Redirecting...");
                    setTimeout(() => { window.location.href = '/book-spot'; }, 500);
                    break;
                case "processing":
                    showMessage("Your payment is processing.");
                    break;
                case "requires_payment_method":
                    showMessage("Your payment was not successful, please try again.");
                    break;
                default:
                    showMessage("Something went wrong.");
                    break;
            }
        }

        // ------- UI helpers -------

        function showMessage(messageText) {
            const messageContainer = document.querySelector("#messages");

            messageContainer.classList.remove("hidden");
            messageContainer.textContent = messageText;

            setTimeout(function () {
                messageContainer.classList.add("hidden");
                messageText.textContent = "";
            }, 4000);
        }

        initialize();
        checkStatus();
    </script>

</body>
</html>
